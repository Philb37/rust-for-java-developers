# Application
spring.application.name=tickets

# PostgreSQL via R2DBC — reactive, non-blocking driver (started via Docker Compose)
spring.r2dbc.url=r2dbc:postgresql://localhost:5432/intro-to-rust
spring.r2dbc.username=postgres
spring.r2dbc.password=password

# Connection pool — kept equivalent to the Rust deadpool config (rust/config.yml)
# for a fair benchmark.
spring.r2dbc.pool.enabled=true
spring.r2dbc.pool.initial-size=10
spring.r2dbc.pool.max-size=10
spring.r2dbc.pool.max-acquire-time=10s
spring.r2dbc.pool.max-create-connection-time=10s

# R2DBC has no schema auto-generation — the table is created by the
# database/init_database.sh script run on container startup.

# Log the SQL statements R2DBC executes (dev convenience, replaces spring.jpa.show-sql)
logging.level.org.springframework.r2dbc.core=DEBUG

# Server
server.port=8085
