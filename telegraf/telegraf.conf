[agent]
  interval = "5s"
  flush_interval = "5s"

[[inputs.docker]]
  endpoint = "unix:///var/run/docker.sock"
  container_name_include = ["*-app"]  # just your two apps
  perdevice_include = []                                    # no per-CPU series (cardinality)
  total_include = ["cpu", "blkio", "network"]

[[outputs.prometheus_client]]
  listen = ":9273"
  metric_version = 2     # modern, Prometheus-idiomatic naming