info:
  name: Create Ticket
  type: http
  seq: 5

http:
  method: POST
  url: "{{baseurl}}/tickets"
  body:
    type: json
    data: |-
      {
        "title": "First ticket",
        "priority": "HIGH",
        "description": "A simple description",
        "assignee": "Me"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
